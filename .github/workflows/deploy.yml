name: Deploy / Destroy Vectorless RAG

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

env:
  TF_VERSION:     '1.7.5'
  PYTHON_VERSION: '3.11'
  NODE_VERSION:   '20'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Deploy (runs on every push to main OR manual "deploy" trigger)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── AWS credentials ─────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Toolchain setup ─────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # must be false so `terraform output` returns clean values

      # ── Build Lambda package ─────────────────────────────────────────────────
      - name: Build Lambda package
        run: |
          pip install \
            --requirement lambda/requirements.txt \
            --target lambda_package/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version ${{ env.PYTHON_VERSION }} \
            --only-binary=:all: \
            --quiet

          cp lambda/*.py lambda_package/

          echo "==> Lambda package contents:"
          ls -1 lambda_package/

      # ── Build React frontend (placeholder config before TF outputs exist) ───
      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend with placeholder config
        run: |
          mkdir -p frontend/public
          echo "/* placeholder — replaced after terraform apply */" \
            > frontend/public/config.js
          npm run build --prefix frontend

      # ── Terraform ────────────────────────────────────────────────────────────
      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=vectorless-rag/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -reconfigure

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -out=tfplan
        env:
          TF_VAR_aws_region:        ${{ secrets.AWS_REGION }}
          TF_VAR_bedrock_model_id:  ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-3-haiku-20240307-v1:0' }}

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve tfplan

      # ── Capture outputs ──────────────────────────────────────────────────────
      - name: Capture Terraform outputs
        id: tf
        run: |
          echo "api_url=$(terraform -chdir=terraform output -raw api_base_url)"          >> $GITHUB_OUTPUT
          echo "website_bucket=$(terraform -chdir=terraform output -raw website_bucket_name)" >> $GITHUB_OUTPUT
          echo "website_url=$(terraform -chdir=terraform output -raw website_url)"       >> $GITHUB_OUTPUT
          echo "docs_bucket=$(terraform -chdir=terraform output -raw documents_bucket_name)" >> $GITHUB_OUTPUT

      # ── Rebuild frontend with real API URL and deploy to S3 ─────────────────
      - name: Rebuild frontend with real API URL
        run: |
          mkdir -p frontend/public
          cat > frontend/public/config.js <<'EOF'
          // Auto-generated by GitHub Actions — do not edit manually.
          window.RAG_API_URL = "${{ steps.tf.outputs.api_url }}";
          EOF
          npm run build --prefix frontend

      - name: Deploy frontend to S3
        run: |
          BUCKET="${{ steps.tf.outputs.website_bucket }}"

          # Static assets — Vite adds content hashes so these can be cached forever
          aws s3 sync frontend/dist/ s3://${BUCKET}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "config.js"

          # index.html — must never be cached (entry point for the SPA)
          aws s3 cp frontend/dist/index.html s3://${BUCKET}/index.html \
            --content-type "text/html" \
            --cache-control "no-cache,no-store,must-revalidate"

          # config.js — must never be cached (contains live API URL)
          aws s3 cp frontend/public/config.js s3://${BUCKET}/config.js \
            --content-type "application/javascript" \
            --cache-control "no-cache,no-store,must-revalidate"

      # ── Write a summary to the Actions run page ──────────────────────────────
      - name: Deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ✅ Deployment complete

          | Output | Value |
          |--------|-------|
          | 🌐 Web UI | ${{ steps.tf.outputs.website_url }} |
          | 🔗 API Base URL | ${{ steps.tf.outputs.api_url }} |
          | 📦 Documents bucket | ${{ steps.tf.outputs.docs_bucket }} |
          EOF

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Destroy (manual trigger only, action = "destroy")
# ─────────────────────────────────────────────────────────────────────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    # Optional: add a "destroy" environment in GitHub Settings → Environments
    # with a required reviewer so a human must approve before resources are deleted.
    # environment: destroy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Lambda package must exist for Terraform to refresh state cleanly
      - name: Build Lambda package (required for Terraform refresh)
        run: |
          pip install \
            --requirement lambda/requirements.txt \
            --target lambda_package/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version ${{ env.PYTHON_VERSION }} \
            --only-binary=:all: \
            --quiet
          cp lambda/*.py lambda_package/

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=vectorless-rag/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -reconfigure

      # S3 buckets must be empty before Terraform can delete them
      - name: Empty S3 buckets
        run: |
          DOCS_BUCKET=$(terraform -chdir=terraform output -raw documents_bucket_name 2>/dev/null || echo "")
          WEBSITE_BUCKET=$(terraform -chdir=terraform output -raw website_bucket_name 2>/dev/null || echo "")

          if [ -n "$DOCS_BUCKET" ]; then
            echo "==> Emptying docs bucket: $DOCS_BUCKET"
            aws s3 rm s3://$DOCS_BUCKET --recursive || true
          fi
          if [ -n "$WEBSITE_BUCKET" ]; then
            echo "==> Emptying website bucket: $WEBSITE_BUCKET"
            aws s3 rm s3://$WEBSITE_BUCKET --recursive || true
          fi
        env:
          TF_VAR_aws_region:       ${{ secrets.AWS_REGION }}
          TF_VAR_bedrock_model_id: ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-3-haiku-20240307-v1:0' }}

      - name: Terraform Destroy
        run: terraform -chdir=terraform destroy -auto-approve
        env:
          TF_VAR_aws_region:       ${{ secrets.AWS_REGION }}
          TF_VAR_bedrock_model_id: ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-3-haiku-20240307-v1:0' }}

      - name: Destroy summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🗑️ Destroy complete

          All AWS resources for **vectorless-rag** have been permanently deleted.

          To redeploy, push a commit to \`main\` or run this workflow again with **action = deploy**.
          EOF
